name: Deploy Panel Admin — GitHub Pages

on:
  push:
    branches:
      - main
  # Permite disparar manualmente desde la UI de GitHub
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

# Solo un deploy a la vez; cancela el anterior si hay uno pendiente
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Gradlew ejecutable
        run: chmod +x gradlew

      - name: Build wasmJs (producción)
        run: ./gradlew :composeApp:wasmJsBrowserDistribution --no-daemon --stacktrace
        env:
          # Las credenciales de Supabase se leen en tiempo de compilación
          # si SupabaseConfig usa variables de entorno; de lo contrario
          # están embebidas en el código (hardcoded en SupabaseConfig.kt).
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Upload artifact para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: composeApp/build/dist/wasmJs/productionExecutable

      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
